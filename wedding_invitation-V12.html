<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia & Greg Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            overflow: visible;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Times New Roman", Times, serif;
            padding-bottom: 80px;
            perspective: 1500px;
        }

        .envelope-wrapper {
            position: relative;
            width: 700px;
            height: 480px;
            cursor: pointer;
            filter: 
                drop-shadow(0 2px 4px rgba(0,0,0,0.3))
                drop-shadow(0 10px 20px rgba(0,0,0,0.35))
                drop-shadow(0 30px 50px rgba(0,0,0,0.4));
        }

        /* Back of envelope — darkest layer */
        .envelope-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(170deg, #161616 0%, #111 50%, #0d0d0d 100%);
            border-radius: 5px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.25);
            z-index: 1;
        }

        /* Invitation card */
        .invitation-card {
            position: absolute;
            top: 20px;
            left: 50%;
            width: 440px; 
            height: 650px;
            background-image: url('invite.jpg'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.4);
            z-index: 2;
            transform: translate(-50%, 0) scale(0.68); 
            transform-origin: top center;
        }

        /* ============================================
           ENVELOPE FLAPS
           Fold visibility comes from TONAL CONTRAST
           between adjacent flaps, not white lines.
           Side flaps get subtle crease lines.
           Bottom flap is clean (no lines).
           ============================================ */

        /* Left flap — mid tone */
        .flap-left {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            clip-path: polygon(0 0, 50% 50%, 0 100%);
            background: linear-gradient(135deg, #1e1e1e 0%, #1a1a1a 50%, #161616 100%);
            border-radius: 5px;
            pointer-events: none;
        }
        /* Subtle fold crease */
        .flap-left::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg,
                transparent 0%, transparent 48.5%,
                rgba(255,255,255,0.05) 49.2%,
                rgba(255,255,255,0.10) 50%,
                rgba(255,255,255,0.05) 50.8%,
                transparent 51.5%, transparent 100%);
        }

        /* Right flap — slightly lighter than left */
        .flap-right {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            clip-path: polygon(100% 0, 50% 50%, 100% 100%);
            background: linear-gradient(225deg, #202020 0%, #1c1c1c 50%, #181818 100%);
            border-radius: 5px;
            pointer-events: none;
        }
        .flap-right::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(225deg,
                transparent 0%, transparent 48.5%,
                rgba(255,255,255,0.05) 49.2%,
                rgba(255,255,255,0.10) 50%,
                rgba(255,255,255,0.05) 50.8%,
                transparent 51.5%, transparent 100%);
        }

        /* Bottom flap — lightest, most prominent. No fold lines. */
        .flap-bottom {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 4;
            clip-path: polygon(0 100%, 50% 42%, 100% 100%);
            background: linear-gradient(0deg, #2a2a2a 0%, #252525 40%, #1f1f1f 100%);
            border-radius: 5px;
            pointer-events: none;
        }

        /* ============================================
           TOP FLAP — brightest flap for max contrast
           against the darker side flaps
           ============================================ */
        .flap-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 320px;
            z-index: 5;
            transform-origin: top;
            transition: transform 0.6s ease-in-out, z-index 0s 0.3s;
            transform-style: preserve-3d;
        }

        .flap-shape {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #2c2c2c 0%, #262626 40%, #202020 100%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }
        /* Subtle vignette for depth */
        .flap-shape::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 30%, transparent 30%, rgba(0,0,0,0.1) 100%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }
        /* Shadow where top flap tip meets bottom flap */
        .flap-shape::before {
            content: '';
            position: absolute;
            bottom: 0; left: 15%;
            width: 70%; height: 30px;
            background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.3) 0%, transparent 70%);
            z-index: 1;
        }

        /* ============================================
           WAX SEAL — PNG image
           Place your seal image as 'wax-seal.png' in the same folder.
           Use a PNG with transparent background for best results.
           ============================================ */
        .wax-seal {
            position: absolute;
            bottom: -38px;
            left: 50%;
            transform: translateX(-50%);
            width: 95px; height: 95px;
            z-index: 6;
            backface-visibility: hidden;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55));
        }

        .wax-seal img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ============================================
           LINEN TEXTURE — image overlay
           ============================================ */
        .paper-grain {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10;
            background-image: url('envelope-texture.jpg');
            background-size: cover;
            background-position: center;
            mix-blend-mode: screen;
            opacity: 0.18;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        .envelope-wrapper.open .flap-container {
            transform: rotateX(180deg);
            z-index: 1; 
        }
        
        .envelope-wrapper.open .invitation-card {
            animation: pullOutAndCenter 2.2s forwards cubic-bezier(0.25, 1, 0.5, 1);
            animation-delay: 0.5s;
        }

        @keyframes pullOutAndCenter {
            0% { 
                transform: translate(-50%, 0) scale(0.68); 
                z-index: 2; 
            }
            40% { 
                transform: translate(-50%, -480px) scale(0.68);
                z-index: 2; 
            }
            45% { 
                transform: translate(-50%, -480px) scale(0.68); 
                z-index: 20;
            }
            100% { 
                transform: translate(-50%, -90px) scale(1.05); 
                z-index: 20; 
                box-shadow: 0 30px 60px rgba(0,0,0,0.7); 
            }
        }

        .hint {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .envelope-wrapper.open .hint {
            opacity: 0;
        }

        /* Clickable website link overlay */
        .card-link {
            position: absolute;
            bottom: 4.5%;
            left: 10%;
            width: 80%;
            height: 4%;
            z-index: 25;
            cursor: pointer;
            pointer-events: none;
            border-radius: 3px;
        }
        .card-link:hover {
            background: rgba(0,0,0,0.04);
        }
        .envelope-wrapper.open .card-link {
            pointer-events: auto;
        }

        /* ============================================
           MOBILE RESPONSIVE
           Scale the envelope to fill phone screens.
           Uses CSS transform to scale uniformly so all
           proportions and animations stay intact.
           ============================================ */
        @media (max-width: 768px) {
            body {
                padding-bottom: 60px;
            }

            .envelope-wrapper {
                width: 340px;
                height: 233px;
            }

            /* 
               Card must fit inside the 233px mobile envelope.
               Formula: scale = (envelope_height - top) / card_height
               (233 - 10) / 650 = 0.34
               The animation 0% keyframe must match this value.
            */
            .invitation-card {
                top: 10px;
                transform: translate(-50%, 0) scale(0.34);
            }

            .flap-container {
                height: 155px;
            }

            .wax-seal {
                width: 50px; height: 50px;
                bottom: -20px;
            }

            .hint {
                bottom: -40px;
                font-size: 14px;
            }

            .flap-shape::before {
                height: 15px;
            }

            /* Card animation for mobile */
            .envelope-wrapper.open .invitation-card {
                animation: pullOutAndCenterMobile 2.2s forwards cubic-bezier(0.25, 1, 0.5, 1);
                animation-delay: 0.5s;
            }

            @keyframes pullOutAndCenterMobile {
                0% { 
                    transform: translate(-50%, 0) scale(0.34); 
                    z-index: 2; 
                }
                40% { 
                    transform: translate(-50%, -240px) scale(0.34);
                    z-index: 2; 
                }
                45% { 
                    transform: translate(-50%, -240px) scale(0.34); 
                    z-index: 20;
                }
                100% { 
                    /* Adjust scale() here to control opened card size on mobile */
                    transform: translate(-50%, -40px) scale(0.85); 
                    z-index: 20; 
                    box-shadow: 0 15px 30px rgba(0,0,0,0.7); 
                }
            }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.add('open')">
        <div class="envelope-back"></div>
        <div class="invitation-card">
            <a class="card-link" href="https://www.zola.com/wedding/sofiaandgreg2026" target="_blank"></a>
        </div>
        
        <div class="flap-left"></div>
        <div class="flap-right"></div>
        <div class="flap-bottom"></div>
        
        <div class="flap-container">
            <div class="flap-shape"></div>
            <div class="wax-seal">
                <img src="wax-seal.png" alt="Wax seal">
            </div>
        </div>

        <div class="paper-grain"></div>
        
        <div class="hint">Click to open</div>
    </div>

</body>
</html>
